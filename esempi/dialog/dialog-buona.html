<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dialog accessibile</title>

<style>
  body {
    font-family: Arial, sans-serif;
    line-height: 1.5;
    padding: 2rem;
  }

  dialog {
    border: none;
    border-radius: 8px;
    padding: 1.5rem;
    width: 400px;
  }

  dialog::backdrop {
    background: rgba(0,0,0,0.5);
  }

  button {
    margin-top: 1rem;
    margin-right: 0.5rem;
  }

  .content {
    margin-top: 2rem;
  }
</style>
</head>

<body>

<h1>Pagina principale</h1>

<p>
  Contenuto normalmente navigabile.
</p>

<button id="openDialog">
  Apri modale
</button>

<div class="content">
  <a href="#">Link sotto la modale</a>
</div>

<dialog id="confirmDialog" aria-modal="true" aria-labelledby="dialogTitle">

  <h2 id="dialogTitle">
    Conferma eliminazione
  </h2>

  <p>
    Vuoi davvero eliminare il documento?
  </p>

  <button id="confirmBtn">
    Conferma
  </button>

  <button id="closeDialog">
    Annulla
  </button>

</dialog>

<script>
  const dialog = document.getElementById('confirmDialog');
  const openButton = document.getElementById('openDialog');
  const closeButton = document.getElementById('closeDialog');
  const confirmButton = document.getElementById('confirmBtn');

  let lastFocusedElement = null;

  openButton.addEventListener('click', () => {

    // Salva il focus corrente
    lastFocusedElement = document.activeElement;

    // Apre la modale in modo nativo/modale
    dialog.showModal();

    // Focus iniziale coerente
    confirmButton.focus();
  });

  closeButton.addEventListener('click', closeDialog);

  //dialog.addEventListener('cancel', (event) => {
    // ESC chiude il dialog
    //event.preventDefault();
    //closeDialog();
  //});

  function closeDialog() {
    dialog.close();

    // Ripristina focus al trigger
    if (lastFocusedElement) {
      lastFocusedElement.focus();
    }
  }
</script>

</body>
</html>
